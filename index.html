<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classificação - Guilda Nyxen</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');

        :root {
            --bg-color: #0f0f1b;
            --panel-bg: #1a1a2e;
            --primary-color: #e94560;
            --secondary-color: #0f3460;
            --text-color: #ffffff;
            --table-border: #2a2a4a;
            --danger-color: #ff4757;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 10px;
            min-height: 100vh;
        }

        h1 {
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px var(--primary-color);
            text-align: center;
        }

        .admin-panel {
            background-color: var(--panel-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 800px;
            margin-bottom: 30px;
            border: 1px solid var(--table-border);
        }

        .input-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 140px;
        }

        .match-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px;
            background-color: rgba(255, 255, 255, 0.02);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--table-border);
        }

        .match-box h4 {
            margin-bottom: 10px;
            color: var(--primary-color);
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .match-inputs {
            display: flex;
            gap: 10px;
        }

        .input-group label {
            font-size: 0.8rem;
            margin-bottom: 5px;
            color: #aaa;
        }

        input {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--table-border);
            color: white;
            padding: 10px;
            border-radius: 6px;
            outline: none;
            transition: border-color 0.3s;
            width: 100%;
        }

        input:focus {
            border-color: var(--primary-color);
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
            align-self: flex-end;
            width: 100%;
        }

        .btn-add {
            background-color: var(--primary-color);
            color: white;
            margin-top: 10px;
        }

        .btn-add:hover {
            box-shadow: 0 0 15px var(--primary-color);
            transform: translateY(-2px);
        }

        .btn-download {
            background-color: #4ecca3;
            color: #1a1a2e;
            margin-top: 20px;
            max-width: 400px;
        }

        .btn-download:hover {
            box-shadow: 0 0 15px #4ecca3;
            transform: translateY(-2px);
        }

        /* Botão de Remover da Tabela */
        button.btn-remove {
            background-color: var(--danger-color);
            color: white;
            width: auto;
            padding: 6px 12px;
            font-size: 0.8rem;
            margin: 0 auto;
            display: block;
            border-radius: 4px;
        }

        button.btn-remove:hover {
            box-shadow: 0 0 10px var(--danger-color);
            transform: scale(1.05);
        }

        /* Área da Imagem */
        .capture-area {
            background-color: var(--panel-bg);
            padding: 20px 10px;
            border-radius: 12px;
            border: 2px solid var(--secondary-color);
            width: 100%;
            max-width: 800px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            overflow: hidden;
            overflow-x: auto; /* Permite rolagem no mobile se a tabela for muito larga */
        }

        .capture-header {
            text-align: center;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--table-border);
            padding-bottom: 15px;
        }

        .capture-header h2 {
            color: var(--primary-color);
            font-size: 1.6rem;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .rules-note {
            color: var(--danger-color);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
            font-size: 0.85rem;
        }

        th, td {
            padding: 10px 5px;
            border-bottom: 1px solid var(--table-border);
            vertical-align: middle;
        }

        th {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--primary-color);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.8rem;
        }

        tr:hover td {
            background-color: rgba(255, 255, 255, 0.02);
        }

        .team-cell {
            text-align: left;
            padding-left: 10px;
        }

        .team-name {
            display: block;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .penalty-info {
            display: block;
            font-size: 0.65rem;
            color: #ff4757;
            opacity: 0.7;
            margin-top: 2px;
            font-weight: 400;
            white-space: nowrap;
        }

        /* Destaques do pódio */
        tbody tr:nth-child(1) td { color: #ffd700; font-weight: bold; font-size: 0.95rem; }
        tbody tr:nth-child(2) td { color: #c0c0c0; }
        tbody tr:nth-child(3) td { color: #cd7f32; }

    </style>
</head>
<body>

    <h1>Painel Adm - X-Treino Nyxen</h1>

    <div class="admin-panel">
        <div class="input-row">
            <div class="input-group" style="flex: 2;">
                <label for="nomeLine">Nome da Line</label>
                <input type="text" id="nomeLine" placeholder="Ex: Line Alpha">
            </div>
        </div>

        <div class="match-grid">
            <div class="match-box">
                <h4>Queda 1</h4>
                <div class="match-inputs">
                    <div class="input-group">
                        <label>Posição</label>
                        <input type="number" id="pos1" min="1" placeholder="Lugar">
                    </div>
                    <div class="input-group">
                        <label>Kills</label>
                        <input type="number" id="kill1" min="0" placeholder="Kills">
                    </div>
                </div>
            </div>
            <div class="match-box">
                <h4>Queda 2</h4>
                <div class="match-inputs">
                    <div class="input-group">
                        <label>Posição</label>
                        <input type="number" id="pos2" min="1" placeholder="Lugar">
                    </div>
                    <div class="input-group">
                        <label>Kills</label>
                        <input type="number" id="kill2" min="0" placeholder="Kills">
                    </div>
                </div>
            </div>
            <div class="match-box">
                <h4>Queda 3</h4>
                <div class="match-inputs">
                    <div class="input-group">
                        <label>Posição</label>
                        <input type="number" id="pos3" min="1" placeholder="Lugar">
                    </div>
                    <div class="input-group">
                        <label>Kills</label>
                        <input type="number" id="kill3" min="0" placeholder="Kills">
                    </div>
                </div>
            </div>
        </div>

        <div class="input-row">
            <div class="input-group">
                <label for="penalidade">Pontos Removidos</label>
                <input type="number" id="penalidade" min="0" placeholder="0">
            </div>
            <div class="input-group" style="flex: 2;">
                <label for="motivo">Motivo da Penalidade</label>
                <input type="text" id="motivo" placeholder="Ex: Uso de Mag7">
            </div>
        </div>

        <button class="btn-add" onclick="adicionarLine()">Adicionar Line à Tabela</button>
    </div>

    <div class="capture-area" id="tabelaNyxen">
        <div class="capture-header">
            <h2>🏆 GUILDA NYXEN 🏆</h2>
            <p>Classificação Oficial - X-Treino</p>
            <p class="rules-note">⚠️ Armas proibidas: Mag7 e Trogon ⚠️</p>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Pos</th>
                    <th class="team-cell">Line</th>
                    <th>Kills</th>
                    <th>Total</th>
                    <th data-html2canvas-ignore="true">Ação</th>
                </tr>
            </thead>
            <tbody id="corpoTabela">
                </tbody>
        </table>
    </div>

    <button class="btn-download" onclick="gerarFoto()">📸 Gerar Imagem da Tabela</button>

    <script>
        let classificacao = [];

        function calcularPontosPosicao(posicao) {
            if (!posicao || posicao <= 0) return 0;
            if (posicao === 1) return 15;
            if (posicao === 2) return 11;
            if (posicao === 3) return 9;
            if (posicao === 4) return 7;
            if (posicao >= 5) return 2;
            return 0;
        }

        function adicionarLine() {
            const nome = document.getElementById('nomeLine').value;
            
            const pos1 = parseInt(document.getElementById('pos1').value) || 0;
            const kill1 = parseInt(document.getElementById('kill1').value) || 0;
            const pos2 = parseInt(document.getElementById('pos2').value) || 0;
            const kill2 = parseInt(document.getElementById('kill2').value) || 0;
            const pos3 = parseInt(document.getElementById('pos3').value) || 0;
            const kill3 = parseInt(document.getElementById('kill3').value) || 0;

            const penalidade = parseInt(document.getElementById('penalidade').value) || 0;
            const motivo = document.getElementById('motivo').value.trim();

            if (nome.trim() === '') {
                alert("O nome da Line é obrigatório!");
                return;
            }

            const totalKills = kill1 + kill2 + kill3;
            const pontosKills = totalKills * 2;
            const pontosColocacao = calcularPontosPosicao(pos1) + calcularPontosPosicao(pos2) + calcularPontosPosicao(pos3);
            const pontosTotais = pontosKills + pontosColocacao - penalidade;

            classificacao.push({ 
                nome, 
                totalKills, 
                penalidade, 
                motivo, 
                pontosTotais 
            });

            ordenarEAtualizar();
            limparFormulario();
        }

        // Função separada para remover
        function removerLine(index) {
            if (confirm(`Tem certeza que deseja remover a line "${classificacao[index].nome}"?`)) {
                classificacao.splice(index, 1); // Remove 1 item a partir do index
                ordenarEAtualizar();
            }
        }

        function ordenarEAtualizar() {
            classificacao.sort((a, b) => {
                if (b.pontosTotais !== a.pontosTotais) {
                    return b.pontosTotais - a.pontosTotais;
                }
                return b.totalKills - a.totalKills;
            });

            atualizarTabela();
        }

        function atualizarTabela() {
            const tbody = document.getElementById('corpoTabela');
            tbody.innerHTML = ''; 

            classificacao.forEach((line, index) => {
                let htmlPenalidade = "";

                if (line.penalidade > 0) {
                    let textoMotivo = line.motivo !== "" ? ` - ${line.motivo}` : "";
                    htmlPenalidade = `<span class="penalty-info">(-${line.penalidade} pts${textoMotivo})</span>`;
                }

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${index + 1}º</td>
                    <td class="team-cell">
                        <span class="team-name">${line.nome}</span>
                        ${htmlPenalidade}
                    </td>
                    <td>${line.totalKills}</td>
                    <td>${line.pontosTotais}</td>
                    <td data-html2canvas-ignore="true">
                        <button class="btn-remove" onclick="removerLine(${index})" title="Remover Line">X</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function limparFormulario() {
            const inputs = ['nomeLine', 'pos1', 'kill1', 'pos2', 'kill2', 'pos3', 'kill3', 'penalidade', 'motivo'];
            inputs.forEach(id => document.getElementById(id).value = '');
            document.getElementById('nomeLine').focus();
        }

        function gerarFoto() {
            if (classificacao.length === 0) {
                alert("Adicione pelo menos uma line antes de gerar a imagem!");
                return;
            }

            const elementoParaFoto = document.getElementById('tabelaNyxen');

            html2canvas(elementoParaFoto, {
                backgroundColor: "#1a1a2e",
                scale: 2
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Nyxen_Resultados.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }
    </script>
</body>
</html>
